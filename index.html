<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashfall: The Last Ember</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- HUD Overlay -->
    <div id="hud">
        <div class="hud-top">
            <div class="stat-bar">
                <label>Health</label>
                <div class="bar" id="healthBar">
                    <div class="bar-fill" style="width: 100%;"></div>
                </div>
                <span class="stat-value" id="healthValue">100</span>
            </div>
            <div class="stat-bar">
                <label>Sanity</label>
                <div class="bar" id="sanityBar">
                    <div class="bar-fill" style="width: 100%;"></div>
                </div>
                <span class="stat-value" id="sanityValue">100</span>
            </div>
        </div>
        <div class="hud-bottom">
            <div class="inventory">
                <div class="item">
                    <label>Stun Rounds</label>
                    <span id="ammoCount">2</span>
                </div>
                <div class="item">
                    <label>Battery</label>
                    <span id="batteryCount">100%</span>
                </div>
                <div class="item">
                    <label>Flashlight</label>
                    <span id="flashlightStatus">OFF</span>
                </div>
            </div>
            <div class="dragon-info" id="dragonInfo" style="display: none;">
                <div class="dragon-trust">
                    <label>Dragon Bond</label>
                    <div class="bar" id="dragonTrustBar">
                        <div class="bar-fill" style="width: 50%;"></div>
                    </div>
                    <span class="trust-label" id="trustLabel">Unstable</span>
                </div>
                <div class="dragon-ability">
                    <label>Ability Uses</label>
                    <span id="abilityUses">3/3</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Interaction Prompt -->
    <div id="interactPrompt" style="display: none;">
        Press E to interact
    </div>

    <!-- Log Box -->
    <div id="logBox"></div>

    <!-- Pointer Lock Instruction -->
    <div id="lockInstruction">
        <p>Click to start</p>
    </div>

    <!-- Modal Overlay (for puzzles/endings) -->
    <div id="modalOverlay" class="modal-overlay" style="display: none;">
        <div id="modalContent" class="modal-content">
            <!-- Dynamic content injected here -->
        </div>
    </div>

    <script src="game.js"></script>
        </html>
